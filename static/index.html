<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard</title>

  <!-- Google Fonts import karte hain UI ke liye -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Plotly.js chart backend -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <!-- React aur ReactDOM ko CDN se import kiya taaki local node.js ki zarurat na ho -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (JSX ko browser me compile karne ke liye) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Chart ka background transparent banane ke liye ek chota fix */
    .js-plotly-plot .plotly .main-svg {
      background: transparent !important;
    }
    
    .animate-fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">
  
  <!-- Root block jiske andar React app mount hoga -->
  <div id="root"></div>

  <!-- Main React Frontend Application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Market cap values ko handle aur readable banane ke liye 
    function formatMarketCap(mc) {
      if (!mc) return "N/A";
      if (mc > 1e12) return (mc / 1e12).toFixed(2) + "T";
      if (mc > 1e9) return (mc / 1e9).toFixed(2) + "B";
      if (mc > 1e6) return (mc / 1e6).toFixed(2) + "M";
      return mc;
    }

    // Dashboard UI Component 
    function StockDashboard() {
      
      // React states yahan define karte hain user input aur variables ke liye
      const [tickerInput, setTickerInput] = useState("");
      const [period, setPeriod] = useState("1mo");
      const [popularStocks, setPopularStocks] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [stockData, setStockData] = useState(null);
      
      // Plotly chart container ka reference 
      const chartRef = useRef(null);

      // Jab page pratham baar load hota hai popular stocks fetch karte hain
      useEffect(() => {
        fetch("/popular-stocks")
          .then(res => res.json())
          .then(data => {
            const all = [...data.indian_stocks, ...data.us_stocks];
            setPopularStocks(all);
          })
          .catch(err => console.error("Popular stocks laane me issue hua:", err));
      }, []);

      // Jab bhi naya stockdata chart me aata hai toh usko Plotly pe update karein
      useEffect(() => {
        if (stockData && stockData.chart && chartRef.current) {
          const chartData = JSON.parse(stockData.chart);

          // Plotly ko samajh aane layk date string mein format karna  
          if (chartData.data[0] && chartData.data[0].x) {
            chartData.data[0].x = chartData.data[0].x.map(d => new Date(d).toISOString().split("T")[0]);
          }

          const layout = {
            paper_bgcolor: "#ffffff",
            plot_bgcolor:  "#f9fafb",
            font:    { family: "DM Mono, monospace", size: 11, color: "#6b7280" },
            title:   { text: (chartData.layout.title && chartData.layout.title.text) || "", font: { size: 13, color: "#111827", family: "DM Sans" } },
            margin:  { t: 48, r: 24, b: 48, l: 64 },
            xaxis:   { type: "date", autorange: true, gridcolor: "#f3f4f6", linecolor: "#e5e7eb", showgrid: true },
            yaxis:   { autorange: true, gridcolor: "#f3f4f6", linecolor: "#e5e7eb", showgrid: true },
            showlegend: false,
          };

          if (chartData.data[0]) {
            chartData.data[0].increasing = { line: { color: "#16a34a" } };
            chartData.data[0].decreasing = { line: { color: "#dc2626" } };
          }

          Plotly.newPlot(chartRef.current, chartData.data, layout, { responsive: true, displayModeBar: false });
        }
      }, [stockData]);

      // Stock ko dhoondhne aur backend ko request bhejne ka function
      const handleSearch = async (overrideTicker = null) => {
        const searchTicker = overrideTicker || tickerInput.trim().toUpperCase();
        if (!searchTicker) {
          alert("Koi stock ka naam ya symbol dijiye");
          return;
        }

        setLoading(true);
        setError(null);
        setStockData(null);

        try {
          const res = await fetch(`/stock/${searchTicker}?period=${period}`);
          const data = await res.json();
          
          if (data.error) {
            setError(data.error);
          } else {
            setStockData(data);
          }
        } catch (err) {
          setError("Server se connect nahi ho pa raha hai.");
        } finally {
          setLoading(false);
        }
      };

      // Input bar ke andar bhi enter daba kar search kiya ja sakta hai
      const handleKeyPress = (e) => {
        if (e.key === "Enter") handleSearch();
      };

      return (
        <div>
          <header className="border-b border-gray-200 bg-white">
            <div className="max-w-4xl mx-auto px-6 py-5 flex items-baseline gap-4">
              <h1 className="text-xl font-semibold tracking-tight text-gray-900">Stock Dashboard</h1>
              <span className="text-sm text-gray-400 font-light">React Frontend</span>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-6 py-8 space-y-6">
            
            {/* Search Input UI */}
            <div className="flex gap-3 items-center">
              <input
                type="text"
                value={tickerInput}
                onChange={(e) => setTickerInput(e.target.value)}
                onKeyPress={handleKeyPress}
                placeholder="Enter ticker (jaise ki, TCS.NS, AAPL)"
                className="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm bg-white outline-none focus:border-gray-500 font-sans"
              />
              <select
                value={period}
                onChange={(e) => setPeriod(e.target.value)}
                className="border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white outline-none text-gray-600 font-sans"
              >
                <option value="1d">1 Day</option>
                <option value="5d">5 Days</option>
                <option value="1mo">1 Month</option>
                <option value="3mo">3 Months</option>
                <option value="6mo">6 Months</option>
                <option value="1y">1 Year</option>
              </select>
              <button
                onClick={() => handleSearch()}
                className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg"
              >
                Search
              </button>
            </div>

            {/* Quick Suggestions Buttons */}
            <div>
              <p className="text-xs text-gray-400 uppercase tracking-widest mb-2 font-medium">Quick Select</p>
              <div className="flex flex-wrap gap-2">
                {popularStocks.map(stock => (
                  <button
                    key={stock.ticker}
                    onClick={() => {
                      setTickerInput(stock.ticker);
                      handleSearch(stock.ticker);
                    }}
                    className="text-xs border border-gray-300 rounded-md px-3 py-1.5 text-gray-600 bg-white font-mono hover:bg-gray-50 transition-colors"
                  >
                    {stock.ticker}
                  </button>
                ))}
              </div>
            </div>

            {/* Errors ke liye warning box */}
            {error && (
              <div className="border border-red-200 bg-red-50 text-red-600 text-sm rounded-lg px-4 py-3">
                {error}
              </div>
            )}

            {/* Loading text API fetch ke doran */}
            {loading && (
              <div className="text-center py-16 text-sm text-gray-400">
                Fetching data...
              </div>
            )}

            {/* Price aur Company Stats ka row */}
            {stockData && (
              <div className="grid grid-cols-2 gap-4 sm:grid-cols-4 animate-fade-in">
                <div className="bg-white border border-gray-200 rounded-xl px-5 py-4">
                  <p className="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">Company</p>
                  <p className="text-lg font-semibold text-gray-900 leading-tight">{stockData.company_name}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{stockData.ticker}</p>
                </div>
                <div className="bg-white border border-gray-200 rounded-xl px-5 py-4">
                  <p className="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">Price</p>
                  <p className="text-lg font-semibold text-gray-900 font-mono leading-tight">{stockData.current_price}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{stockData.currency}</p>
                </div>
                <div className="bg-white border border-gray-200 rounded-xl px-5 py-4">
                  <p className="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">Market Cap</p>
                  <p className="text-lg font-semibold text-gray-900 font-mono leading-tight">{formatMarketCap(stockData.market_cap)}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{stockData.currency}</p>
                </div>
                <div className="bg-white border border-gray-200 rounded-xl px-5 py-4">
                  <p className="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">Sector</p>
                  <p className="text-lg font-semibold text-gray-900 leading-tight">{stockData.sector}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{stockData.data_points} data points</p>
                </div>
              </div>
            )}

            {/* Plotly Chart ka container */}
            <div className="bg-white border border-gray-200 rounded-xl animate-fade-in min-h-[400px]">
              {!stockData && !loading && (
                <div className="flex flex-col items-center justify-center py-32 text-gray-300">
                  <p className="text-sm font-light">Search a stock to see its chart</p>
                </div>
              )}
              {stockData && <div ref={chartRef} className="w-full h-[400px]"></div>}
            </div>

          </main>
        </div>
      );
    }

    // React code ko page pe render karein
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<StockDashboard />);
  </script>

</body>
</html>
