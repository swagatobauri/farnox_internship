<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    .js-plotly-plot .plotly .main-svg {
      background: transparent !important;
    }
  </style>
</head>

<body class="bg-gray-50 font-sans text-gray-800 min-h-screen">

  <header class="border-b border-gray-200 bg-white">
    <div class="max-w-4xl mx-auto px-6 py-5 flex items-baseline gap-4">
      <h1 class="text-xl font-semibold tracking-tight text-gray-900">Stock Dashboard</h1>
      <span class="text-sm text-gray-400 font-light">Real-time market data</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-6">

    <div class="flex gap-3 items-center">
      <input
        id="ticker-input"
        type="text"
        placeholder="Enter ticker (e.g., TCS.NS, AAPL)"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm bg-white outline-none focus:border-gray-500 font-sans"
      />
      <select
        id="period-select"
        class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-white outline-none text-gray-600 font-sans"
      >
        <option value="1d">1 Day</option>
        <option value="5d">5 Days</option>
        <option value="1mo" selected>1 Month</option>
        <option value="3mo">3 Months</option>
        <option value="6mo">6 Months</option>
        <option value="1y">1 Year</option>
      </select>
      <button
        id="search-btn"
        onclick="searchStock()"
        class="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg"
      >
        Search
      </button>
    </div>

    <div>
      <p class="text-xs text-gray-400 uppercase tracking-widest mb-2 font-medium">Quick Select</p>
      <div id="chips-container" class="flex flex-wrap gap-2"></div>
    </div>

    <div id="error-msg" class="hidden border border-red-200 bg-red-50 text-red-600 text-sm rounded-lg px-4 py-3"></div>

    <div id="loading" class="hidden text-center py-16 text-sm text-gray-400">
      Fetching data...
    </div>

    <div id="stats-row" class="grid grid-cols-2 gap-4 sm:grid-cols-4"></div>

    <div id="chart-container" class="bg-white border border-gray-200 rounded-xl">
      <div id="placeholder" class="flex flex-col items-center justify-center py-24 text-gray-300">
        <p class="text-sm font-light">Search a stock to see its chart</p>
      </div>
      <div id="stock-chart"></div>
    </div>

  </main>

  <footer class="max-w-4xl mx-auto px-6 py-6 border-t border-gray-100 mt-4">
    <p class="text-xs text-gray-300">Data via Yahoo Finance. For educational use only.</p>
  </footer>

  <script>
    window.addEventListener("DOMContentLoaded", function () {
      loadPopularStocks();

      document.getElementById("ticker-input").addEventListener("keypress", function (e) {
        if (e.key === "Enter") searchStock();
      });
    });

    async function loadPopularStocks() {
      try {
        const res = await fetch("/popular-stocks");
        const data = await res.json();
        const container = document.getElementById("chips-container");

        const all = [...data.indian_stocks, ...data.us_stocks];

        all.forEach(function (stock) {
          const btn = document.createElement("button");
          btn.textContent = stock.ticker;
          btn.className = "text-xs border border-gray-300 rounded-md px-3 py-1.5 text-gray-600 bg-white font-mono";
          btn.onclick = function () {
            document.getElementById("ticker-input").value = stock.ticker;
            searchStock();
          };
          container.appendChild(btn);
        });
      } catch (err) {
        console.error("Failed to load popular stocks", err);
      }
    }

    async function searchStock() {
      const ticker = document.getElementById("ticker-input").value.trim().toUpperCase();
      const period = document.getElementById("period-select").value;

      if (!ticker) {
        alert("Please enter a stock ticker.");
        return;
      }

      document.getElementById("error-msg").classList.add("hidden");
      document.getElementById("stats-row").innerHTML = "";
      document.getElementById("stock-chart").innerHTML = "";
      document.getElementById("placeholder").style.display = "none";
      document.getElementById("loading").classList.remove("hidden");

      try {
        const res = await fetch(`/stock/${ticker}?period=${period}`);
        const data = await res.json();

        document.getElementById("loading").classList.add("hidden");

        if (data.error) {
          showError(data.error);
          return;
        }

        renderStats(data);
        renderChart(data.chart);
      } catch (err) {
        document.getElementById("loading").classList.add("hidden");
        showError("Could not connect to server.");
      }
    }

    function renderStats(data) {
      let mc = data.market_cap;
      let mcText = "N/A";
      if (mc > 1e12)     mcText = (mc / 1e12).toFixed(2) + "T";
      else if (mc > 1e9) mcText = (mc / 1e9).toFixed(2) + "B";
      else if (mc > 1e6) mcText = (mc / 1e6).toFixed(2) + "M";

      const cards = [
        { label: "Company",      value: data.company_name,              sub: data.ticker,        mono: false },
        { label: "Price",        value: data.current_price,             sub: data.currency,      mono: true  },
        { label: "Market Cap",   value: mcText,                         sub: data.currency,      mono: true  },
        { label: "Sector",       value: data.sector,                    sub: data.data_points + " data points", mono: false },
      ];

      const row = document.getElementById("stats-row");
      row.innerHTML = cards.map(function (c) {
        return `
          <div class="bg-white border border-gray-200 rounded-xl px-5 py-4">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">${c.label}</p>
            <p class="text-lg font-semibold text-gray-900 ${c.mono ? 'font-mono' : ''} leading-tight">${c.value}</p>
            <p class="text-xs text-gray-400 mt-0.5">${c.sub}</p>
          </div>
        `;
      }).join("");
    }

    function renderChart(chartJson) {
      const chartData = JSON.parse(chartJson);

      if (chartData.data[0] && chartData.data[0].x) {
        chartData.data[0].x = chartData.data[0].x.map(function(d) {
          return new Date(d).toISOString().split("T")[0];
        });
      }

      const layout = {
        paper_bgcolor: "#ffffff",
        plot_bgcolor:  "#f9fafb",
        font:    { family: "DM Mono, monospace", size: 11, color: "#6b7280" },
        title:   { text: (chartData.layout.title && chartData.layout.title.text) || "", font: { size: 13, color: "#111827", family: "DM Sans" } },
        margin:  { t: 48, r: 24, b: 48, l: 64 },
        xaxis:   { type: "date", autorange: true, gridcolor: "#f3f4f6", linecolor: "#e5e7eb", showgrid: true },
        yaxis:   { autorange: true, gridcolor: "#f3f4f6", linecolor: "#e5e7eb", showgrid: true },
        showlegend: false,
      };

      if (chartData.data[0]) {
        chartData.data[0].increasing = { line: { color: "#16a34a" } };
        chartData.data[0].decreasing = { line: { color: "#dc2626" } };
      }

      Plotly.newPlot("stock-chart", chartData.data, layout, { responsive: true, displayModeBar: false });
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
      document.getElementById("placeholder").style.display = "flex";
    }
  </script>

</body>
</html>
